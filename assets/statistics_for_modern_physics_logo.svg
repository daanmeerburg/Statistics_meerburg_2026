    <text x="23" y="2">Jupyter</text>
    <rect x="162" y="-25" width="112" height="42" rx="21" fill="#ffffff" opacity="0.12"/>
    <text x="193" y="2">Colab</text>
    <rect x="294" y="-25" width="88" height="42" rx="21" fill="#ffffff" opacity="0.12"/>
    <text x="323" y="2">Git</text>
